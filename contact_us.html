<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us | TravelBloom</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Task 5: Navbar (Links only) -->
    <nav>
        <div class="logo">
            <h2>TravelBloom</h2>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about_us.html">About Us</a>
            <a href="contact_us.html">Contact Us</a>
        </div>
    </nav>

    <div class="page-container">
        <section class="contact-section">
            <h1>CONTACT US</h1>
            <p style="margin-bottom: 30px;">Get in touch with our travel experts</p>

            <!-- Task 5: Contact Form -->
            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="message" placeholder="How can we help you?"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>
    </div>

    <script>
        // Simple feedback for the user on submit
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Thank you for reaching out! Our team will contact you soon.");
            e.target.reset();
        });
    </script>
</body>

</html>
